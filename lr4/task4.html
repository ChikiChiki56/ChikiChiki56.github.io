<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Батарейки</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .battery {
            position: relative;
            width: 200px;
            height: 80px;
            background-color: #ecf0f1;
            border: 8px solid #000;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .battery::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            height: 100%;
            transition: width 0.3s ease-in-out;
        }

        .red::before {
            width: 25%;
            background-color: #e74c3c;
        }

        .yellow::before {
            width: 65%;
            background-color: #f1c40f;
        }

        .green::before {
            width: 100%;
            background-color: #2ecc71;
        }
        .button {
    
            background-color: rgb(65, 132, 194) ;
            border: none;
            color: rgb(255, 255, 255);
            padding: 25px 52px;
            text-align: center;
            -webkit-transition-duration: 0.4s;
            transition-duration: 0.4s;
            text-decoration: none;
            font-size: 10px;
            text-align: center; 
            cursor: pointer;
            display: inline-block;
            box-shadow: 0px 1px 5px rgb(65, 149, 194);
            margin: 20px ;
        }
    </style>
</head>
<body>
    <div class="battery red"></div>
    <div class="battery yellow"></div>
    <div class="battery green"></div>
    <span></span>
    <a href="/index.html" class="button"><span class="back">Go Back!</span></a>
</body>
</html>
