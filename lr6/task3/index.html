<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Template</title>
<style>
.fullwrap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.1); /* прозорий фон */
}

.container {
  position: absolute;
  width: 650px;
  height: 450px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border: 1px solid black;
}

header, main, sidebar, footer {
    position:absolute;
  width: calc(100% - 20px); 
  background: rgb(230, 229, 229);
  border: 1px solid black;

}

header {
    top: 10px;
    left: 10px;
  height: 40px;
  text-align: center;
}

main {

  top: 60px; 
  left: 10px;
  width: 65%;
  height: calc(100% - 135px);
}

sidebar {

  top: 60px;
  right: 10px;
  width: 30%; 
  height: calc(100% - 135px);
}

footer {
left: 10px;
  bottom: 10px;
  height: 50px;
  text-align: center;
}
</style>
</head>
<body>
    <div class="container">
        <header>Header</header>
        <main>Main Content</main>
        <sidebar>Sidebar</sidebar>
        <footer>Footer</footer>
      </div>
</body>
</html>
