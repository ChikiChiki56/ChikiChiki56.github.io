<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lr7</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="arrow">-</div>
        <div class="arrow_r">-</div>


        <div class="block section1">
            <div class="circle1">Новинка</div>
            <p class="category">Захист</p>

            <div class="line">

            </div>
            <img src="https://football-world.com.ua/product-images/product/Europaw/40103-65266b17f1fb5.webp" alt="">
            <p class="itemname">Щитки</p>
            <p class="price"></p>
            <button class="first-button">Незабаром у продажі</button>
        </div>
        <div class="block section2">
            <div class="circle3"></div>
            <p class="category">Одяг</p>
            <div class="line"></div>
            <img src="https://football-world.com.ua/product-images/product/Zeus/13827-61030bcd6abef.webp" alt="">
            <p class="itemname">Гетри</p>
            <p class="price">190 uah</p>
            <button>В корзину</button>
        </div>
        <div class="block section3">
            <div class="circle2"><span class="hit">Хіт продажів</span></div>
            <p class="category">Захист</p>
            <div class="line"></div>
            <img src="https://football-world.com.ua/product-images/product/Kelme/13548-61030a90642d5.webp" alt="">
            <p class="itemname">Рукавиці</p>
            <p class="price">320 uah</p>
            <button>В корзину</button>
        </div>
        <div class="block section4">
            <div class="circle2">Хіт продажів</div>
            <p class="category">Інвентар</p>
            <div class="line">

            </div>
            <img src="https://football-world.com.ua/product-images/product/Joma/13154-610307fca9bb9.webp" alt="">
            <p class="itemname">М'яч</p>
            <p class="price">480 uah</p>
            <button>В корзину</button>
        </div>
    </div>
</body>
</html>
