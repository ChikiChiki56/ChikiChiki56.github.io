<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .calculator {
      width: 300px;
      height: 460px;
      border: 3px solid rgb(83, 156, 157);
      border-radius: 10px;
      margin: 0 auto;
      text-align: center;
    
    }
    .line {
        
        width: 100;
        height: 50px;
        margin-top: 15px;
        background: rgb(83, 156, 157);
        
    }
    span {
        margin: 15px;
        text-align: center;
        float: right;
        color: azure;
    }
   
    input[type="text"] {
      width: 90%;
      height: 50px;
      margin:  15px 15px;
      padding: 10px;
      box-sizing: border-box;
      border: 3px solid rgb(83, 156, 157);
      border-radius: 10px;
    }

    .line2 {
    width: 100%;
    height: 50px;
    background: transparent;
    margin-bottom: 15px;
    position: relative; /* додаємо позицію relative для використання позиціонування ::after */
}

.line2::after {
    content: "";
    width: 30%;
    height: 100%;
    margin-right: 15px;
    background: rgb(83, 156, 157);
    position: absolute;
    top: 0;
    right: 0;
}

.button {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    height: 50%;
    margin: 10px;
    border: 1px solid transparent;
}
    button {
        flex: auto;
        float: left;
        background: transparent;
        height: 50px;
        width: 50px;
        padding: 10px;
        margin: 5px;
      font-size: 16px;
      cursor: pointer;
      color: rgb(83, 156, 157);
      border: 3px solid rgb(83, 156, 157);
      border-radius: 10px;
    }
  </style>
  <title>Simple Calculator</title>
</head>
<body>
  <div class="calculator">
    <div class="line"><span>Casio 3234</span></div>
    <input type="text" id="display" disabled>
    <div class="line2"></div>
<div class="button">
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>+</button><br>
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>-</button><br>
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>/</button><br>
    <button>.</button>
    <button>0</button>
    <button>=</button>
    <button>*</button><br>
</div>
    
  </div>
</body>
</html>
