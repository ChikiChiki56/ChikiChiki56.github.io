<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
            <title>Menu</title>
                <style>
                    .links {
                        background: #F6967D;
                    }
                    .links a {
                        color: #FFFDEB;
                        display: inline-block;
                        border-right: 1px solid #B62025;
                        padding: 5px 10px;
                    }
                    .links a:last-child {
                        border-right: none; 
                    }
                    .button {
    
                        background-color: rgb(65, 132, 194) ;
                        border: none;
                        color: rgb(255, 255, 255);
                        padding: 25px 52px;
                        text-align: center;
                        -webkit-transition-duration: 0.4s;
                        transition-duration: 0.4s;
                        text-decoration: none;
                        font-size: 10px;
                        text-align: center; 
                        cursor: pointer;
                        display: inline-block;
                        box-shadow: 0px 1px 5px rgb(65, 149, 194);
                        margin: 20px ;
                    }   
                </style>
    </head>
         <body>
            <div class="links">
               <a href="1.html">link 1</a>
               <a href="2.html">link 2</a>
               <a href="3.html">link 3</a>
               <a href="4.html">link 4</a>
           </div>
           <a href="/index.html" class="button"><span class="back">Go Back!</span></a>
        </body>
</html>
